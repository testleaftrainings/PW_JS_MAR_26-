# Data Parameterization with JSON
------------------------------------
Definition
Feeding test data from external JSON files instead of hardcoding values.
Useful for data-driven testing.

🧠 What is JSON?
JSON = JavaScript Object Notation
A text format for structured data that humans & machines both love 💕

json
{
  "name": "Bhuvi",
  "role": "SDET",
  "experience": 7,
  "skills": ["Playwright", "TypeScript", "Selenium", "Java", "Automation"]
}
Building Blocks: 📦

{} Objects ---> { key : value }
[] Arrays  ---> [ value1, value2 ] ex : ["Playwright", "TypeScript", "Selenium", "Java", "Automation"]
📝 Strings ---> "name": "Bhuvi",
🔢 Numbers --->  7
✅ Boolean --->  true
🚫 null

No functions. No logic. Just pure data. — That's the magic! ✨

📜 Born: 2001 👶
👨‍💻 Douglas Crockford realized:

"JavaScript already has clean object syntax — why invent something new?"

Timeline:

🚀 2006–2007 → AJAX web apps explode

📋 2013 → Standardized as ECMA-404

🌍 Today → Internet's default data language

😫 Before JSON: The XML Era
xml
<user>
  <name>Bhuvi</name>
  <role>SDET</role>
</user>
XML Problems: ❌

📜 Verbose (tags everywhere!)
🐌 Heavy parsing
😤 Hard to work with
📦 Big network payloads

XML felt like legal contracts. JSON felt like sticky notes. 📝

🚀 Why JSON Won
Reason	Why It Mattered
=======================
⏱️ Perfect Timing	Web apps (Gmail) needed constant server chat
🔤 Native to JS	        JSON.parse(data) — instant objects!
👀 Human-readable	Debug by looking — no archaeology required
🌎 Language-agnostic	Java, Python, C#, Rust — everyone speaks JSON
🔌 API Perfect	        REST APIs became JSON machines

🔬 Why Simplicity Won
JSON deliberately removed: ❌

💬 Comments
🎭 Custom types
⚙️ Executable code

Result: ✅

🔒 Safe
📊 Predictable
⚡ Fast to parse
📦 Light to transmit

"The most successful technologies remove power, not add it." 💡

🧩 Where You See JSON Daily
---------------------------
Place			Example
🧪 Playwright Tests	API responses
⚙️ Config Files		package.json, tsconfig.json
🔑 Auth			Storage state, tokens
☁️ Cloud			Microservices chat
🗄️ Databases		NoSQL, exports

⚡ Fun Historical Irony
------------------------
Engineers once dismissed JSON as "informal" compared to XML's "serious" standards.

Then reality happened: 👇
Developers voted with productivity. 🗳️
The internet quietly reorganized itself around JSON.

🧠 Mental Model to Keep Forever
JSON = The spreadsheet of the internet
Structured rows of meaning, readable by everyone.

🎯 One-Liner Takeaway
JSON didn't invent data exchange — it just made it feel obvious. ✨


🔬 Why parameterization matters (real engineering reason)

Without it:

*duplicated tests
*maintenance nightmare
*bug fixes repeated everywhere

With it:

*one logic source
*unlimited test coverage
*cleaner reporting

You change logic once → affects all datasets.

