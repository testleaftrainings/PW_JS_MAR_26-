Configuration from package.json
npm install run
in package.json
script:{
"run-commonfiles": "npx playwright test --config=playwright.config.ts",
    "run-qa": "npx playwright test learntoreadmultipleENV.spec.ts --config=playwright.qa.config.ts",
    "run-prod": "npx playwright test learntoreadmultipleENV.spec.ts --config=playwright.prod.config.ts",
    "run-all": "npm run run-qa && npm run run-prod "
}
to execute from package.json 
in terminal -npm run run-qa
to run all combinations
  install run -all
   npm run-all
   npm run run-all


Test Annotation: /Test Runner
test.only --only  the annotated test will run
test.skip -->ignore the specific test from execution
test.fixme-->says that the business logic need s to be fixed/has ui bug
test.slow -->to slow down the execution 3x the default 
test.info -->give info of the test for reporting purpose and also gives the status
test.describe -->group the test 
  by default all the test in  a spec.ts will run sequentially
     serial() -similar to sequential , but here one test is dependent on the previous test status
     parallel()
     configure()
test.beforeAll -->runs once before all the test()
test.beforeEach ->run foe each test method
test.afterEach ->runs after each testmethod
test.afterAll ->runs once after all the test methods

