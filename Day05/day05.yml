 partial attributes
 -----------------
 <input class="button r4 wide primary" type="submit" id="Login" name="Login" value="Log In">
 
 tagname[attribute^=partialAttribueValue]  first part of the  value -prefix
 example: input[class^=button]

 tagname[attribute$=partialattributeValue] -sufix of the attribute value
 example: input[class$=primary]

tagname[attribute*=partialattributeValue] -any part of the attr value
  example: input[class*=wide] 
