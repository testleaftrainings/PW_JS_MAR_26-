Access modifier
----------------
permission for the class property/methods

public -->all the classes
private -->owner of the class /no read / write acces for the other class
protected -->will accessible inside the inherited
readonly -->final data -read only witout write access

Encapsulation
  placing the property and methods under one class using private keyword 
  wrapping the property(data)and methods into a single class(unit) and it is acheived with the help of private keyword
  getter and setter to povide permission to the other class


Inheritance
  inheriting the properties/methods from parent class/base class to subclass/derived class/child class
  building the relationship between two classes 
  IS-A relationship 
  using the keyword extends 

  single Inheritance
   parentclass->subclass 
  Multi level Inheritance
   baseclass->parentclass->subclass
  Hirerchial
    parent class ->childclass1
    parent class->child class2

  Multiple Inheritance is not supported
    child class-->parent 1 , parent 2
    a child class cannot inherit from two parent classes
  class UserProfile extends LoginPage,HomePage